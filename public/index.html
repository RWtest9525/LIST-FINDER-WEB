<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RW List Finder Web</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <button class="menu-button" id="menuButton" type="button" aria-label="Open admin menu">
        <span></span><span></span><span></span>
      </button>
      <div>
        <p>RW List Finder Web</p>
        <h1>Review Lists</h1>
      </div>
    </header>

    <main class="app-main">
      <section class="search-panel">
        <label class="search-field" for="searchInput">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m21 21-4.35-4.35m2.35-5.15a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z" />
          </svg>
          <input id="searchInput" type="search" placeholder="Search app name" autocomplete="off" />
        </label>

        <div class="date-grid">
          <label>
            From
            <input id="fromDateInput" type="date" />
          </label>
          <label>
            To
            <input id="toDateInput" type="date" />
          </label>
        </div>

        <div class="filter-actions">
          <button id="searchButton" class="primary-button" type="button">Search</button>
          <button id="clearFiltersButton" class="secondary-button" type="button">Clear</button>
        </div>
      </section>

      <section class="list-panel">
        <div class="list-head">
          <strong id="resultCount">0 lists</strong>
          <span id="pageInfo">Page 1 of 1</span>
        </div>
        <div id="statusMessage" class="status"></div>
        <div id="results" class="results"></div>
        <div class="pager">
          <button id="prevPageButton" class="secondary-button" type="button">Back</button>
          <button id="nextPageButton" class="secondary-button" type="button">Next</button>
        </div>
      </section>
    </main>

    <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>
    <aside class="admin-drawer" id="adminDrawer" aria-label="Admin panel" aria-hidden="true">
      <div class="drawer-header">
        <div>
          <p>Admin Panel</p>
          <h2 id="drawerTitle">Unlock Upload</h2>
        </div>
        <button class="close-button" id="closeDrawerButton" type="button" aria-label="Close menu">Close</button>
      </div>

      <div class="drawer-status" id="drawerStatus"></div>

      <form class="pin-panel" id="adminLoginForm">
        <label>
          Admin PIN
          <input id="adminPinInput" type="password" inputmode="numeric" placeholder="Enter PIN" autocomplete="off" />
        </label>
        <button class="primary-button" type="submit">Unlock</button>
      </form>

      <section class="upload-panel" id="adminUploadPanel" hidden>
        <form id="uploadForm">
          <label>
            Paste list
            <textarea id="listInput" placeholder="App: WhatsApp&#10;Date: 21-05-2026&#10;Paste 100-200 user names here..." required></textarea>
          </label>
          <button class="primary-button" type="submit">Upload List</button>
          <button class="secondary-button" id="clearFormButton" type="button">Clear</button>
          <button class="logout-button" id="adminLogoutButton" type="button">Logout</button>
        </form>
      </section>
    </aside>

    <template id="listTemplate">
      <article class="list-card">
        <div class="list-info">
          <div>
            <strong class="app-name"></strong>
            <span class="list-date"></span>
          </div>
          <small class="line-count"></small>
        </div>
        <pre class="preview"></pre>
        <button class="copy-button" type="button">Copy List</button>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
